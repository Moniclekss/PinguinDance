version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: pinguindance_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pinguindance
      MYSQL_USER: admin
      MYSQL_PASSWORD: pinguin123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: