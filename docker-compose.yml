version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: pinguindance_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pinguindance
      MYSQL_USER: admin
      MYSQL_PASSWORD: pinguin123
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pinguindance_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: admin
      PMA_PASSWORD: pinguin123
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  db_data: