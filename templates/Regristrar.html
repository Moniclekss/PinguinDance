<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Biométrico RRHH</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='Style.css') }}">
    <style>
        .camera-box { text-align: center; margin-bottom: 15px; }
        video { border-radius: 8px; border: 2px solid #00ff00; width: 100%; max-width: 300px; }
        .btn-capture { background: #00ff00; color: #000; padding: 5px 10px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Alta de Empleado (Biometría)</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}" style="color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; margin-bottom: 15px;">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/register" method="POST" id="formReg">
            <div class="camera-box">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none;"></canvas>
                <input type="hidden" name="foto_base64" id="foto_base64">
                <button type="button" class="btn-capture" onclick="capturar()">📸 Capturar Rostro de Seguridad</button>
                <p id="status-foto" style="color: #0ff; font-size: 12px; display: none;">Rostro capturado y encriptado ✔️</p>
            </div>
            
            <div class="form-group">
                <label for="username">Nombre de empleado:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">Correo corporativo:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña (Respaldo):</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirmar Contraseña:</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" onclick="return validarFoto()">Dar de Alta</button>
        </form>
        <div class="links">
            <a href="/login">Volver al Portal</a>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const fotoInput = document.getElementById('foto_base64');
        
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("No se pudo acceder a la cámara: " + err); });

        function capturar() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            fotoInput.value = canvas.toDataURL('image/jpeg');
            document.getElementById('status-foto').style.display = 'block';
        }
        
        function validarFoto() {
            if (!fotoInput.value) {
                alert("Debe capturar su rostro para encriptar su biometría.");
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
