<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosko Biométrico RRHH</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='Style.css') }}">
    <style>
        .dashboard { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .scanner-view { position: relative; border-radius: 15px; border: 4px solid #0ff; overflow: hidden; margin-bottom: 20px;}
        .scanner-view img { display: block; max-width: 100%; }
        .camera-box { text-align: center; margin-bottom: 15px; }
        video { border-radius: 8px; border: 2px solid #0ff; width: 100%; max-width: 500px; display: none; }
        .btn-asistencia { font-size: 20px; padding: 15px 40px; margin: 10px; cursor: pointer; border-radius: 10px; border: none; font-weight: bold; background: #00ff00;}
        .btn-salida { background: #ff4444; color: white;}
    </style>
</head>
<body>
    <div class="dashboard">
        <h2>KIOSKO DE ASISTENCIA BIOMÉTRICA</h2>
        <h3>Acerque su rostro para el escáner</h3>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}" style="margin: 10px; padding: 10px; background: #333; color: #fff; border-left: 5px solid #0ff;">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Emisión en vivo del nuevo Face Mesh de Flask -->
        <div class="scanner-view">
            <img src="{{ url_for('video_feed') }}" alt="Scanner Facial en vivo" width="700">
        </div>

        <!-- Cámara oculta local para emitir la foto a Flask -->
        <div class="camera-box">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>

        <div>
            <form action="/marcar_asistencia" method="POST" id="formAsistenciaIn" style="display:inline;">
                <input type="hidden" name="tipo" value="ENTRADA">
                <input type="hidden" name="foto_base64" id="foto_base64_in">
                <button type="button" class="btn-asistencia" onclick="enviarFichaje('in')">Fichar Entrada ⏱️</button>
            </form>
            <form action="/marcar_asistencia" method="POST" id="formAsistenciaOut" style="display:inline;">
                <input type="hidden" name="tipo" value="SALIDA">
                <input type="hidden" name="foto_base64" id="foto_base64_out">
                <button type="button" class="btn-asistencia btn-salida" onclick="enviarFichaje('out')">Fichar Salida 🚪</button>
            </form>
        </div>
        
        <br>
        <a href="/login" style="color: #0ff; text-decoration: none;">Acceso a Portal RRHH (Mantenimiento)</a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("No se pudo acceder a la cámara local: " + err); });

        function enviarFichaje(tipo) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            let b64 = canvas.toDataURL('image/jpeg');
            
            if(tipo === 'in'){
                document.getElementById('foto_base64_in').value = b64;
                document.getElementById('formAsistenciaIn').submit();
            } else {
                document.getElementById('foto_base64_out').value = b64;
                document.getElementById('formAsistenciaOut').submit();
            }
        }
    </script>
</body>
</html>
